name: CI

on:
  push:
    branches: [dev, main]
  pull_request:
    branches: [dev, main]

jobs:
  test:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: service_system_v2
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DB_USER: postgres
          DB_PASS: postgres
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: service_system_v2
          JWT_SECRET: ci-test-secret
        run: |
          cd backend
          alembic upgrade head

      - name: Run tests
        env:
          DB_USER: postgres
          DB_PASS: postgres
          DB_HOST: localhost
          DB_PORT: "5432"
          DB_NAME: service_system_v2
          JWT_SECRET: ci-test-secret
        run: |
          cd backend
          python -m pytest -v --tb=short
